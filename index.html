<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
*{
    margin: 0;
    padding: 0;
     -webkit-tap-highlight-color: transparent;
}
button:focus{
  outline: none;
}
body{
  background: linear-gradient(160deg, #e0ffff, #b2ebf2);
  margin:0;
   min-height: 100vh;
}
.btn:active{
  transform: scale(0.94);
  box-shadow: 0 2px 3px rgba(0,0,0,0.25);
}

.container {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);

    width:min(90vmin,420px);
    height:min(90vmin,420px);

    gap:4px;
    margin:auto;
    position:relative;
}

.line{
    position:absolute;
    display:none;
}

.btn{
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,darkcyan,#00b7c2);

    font-size:clamp(2rem,8vmin,5rem);
    text-align:center;

    transition:all 0.5s;
    box-shadow:0 3px 6px rgba(0,0,0,0.25);
    animation:pop 0.2s ease-in;
   
}


h1{
  font-family:"Roboto Slab", serif;
  font-weight:500;
  text-align:center;
  font-size:clamp(26px,5vw,40px);
}

p{
    height:35px;
    width:100%;
    text-align:center;
    font-size:clamp(18px,3vw,30px);
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

.reset{
    height:45px;
    width:clamp(110px,30vw,140px);

    border:none;
    border-radius:10px;

    color:white;
    background-color:orangered;

    font-size:clamp(16px,3vw,19px);

    display:block;
    margin:20px auto;
}

.locked{
    pointer-events:none;
}

.guide{
    height:10px;
    font-family:'Lucida Sans','Lucida Sans Regular','Lucida Grande','Lucida Sans Unicode',Geneva,Verdana,sans-serif;
    font-size:clamp(14px,2.5vw,18px);
    margin-bottom:25px;
    text-align:center;
}

/* ===== COLUMN LINES ===== */

.col1{
    position:absolute;
    width:8px;
    height:100%;
    left:16.66%;
    top:0;
    background:black;
    animation:col 0.6s ease-out;
}

.col2{
    position:absolute;
    width:8px;
    height:100%;
    left:50%;
    top:0;
    background:black;
    animation:col 0.6s ease-out;
}

.col3{
    position:absolute;
    width:8px;
    height:100%;
    left:83.33%;
    top:0;
    background:black;
    animation:col 0.6s ease-out;
}

/* ===== ROW LINES ===== */

.row1{
    position:absolute;
    height:8px;
    width:100%;
    top:16.66%;
    left:0;
    background:black;
    animation:row 0.6s ease-out;
}

.row2{
    position:absolute;
    height:8px;
    width:100%;
    top:50%;
    left:0;
    background:black;
    animation:row 0.6s ease-out;
}

.row3{
    position:absolute;
    height:8px;
    width:100%;
    top:83.33%;
    left:0;
    background:black;
    animation:row 0.6s ease-out;
}

/* ===== DIAGONAL ===== */


.digonal1{
    position:absolute;
    width:8px;
    height:140%;
    top:-20%;
    left:50%;
    transform:rotate(-45deg);
    background:black;
    animation:digonal2 0.6s ease-out;
}
.digonal2{
  position:absolute;
  width:8px;
  height:140%;
  top:-20%;
  left:50%;
  transform:rotate(45deg);
  background:black;
  animation:digonal1 0.6s ease-out;
}

/* ===== ANIMATIONS ===== */

@keyframes digonal1{
  from{ transform:rotate(45deg) scale(0.1);}
  to{ transform:rotate(45deg) scale(1);}
}

@keyframes digonal2{
  from{ transform:rotate(-45deg) scale(0.1);}
  to{ transform:rotate(-45deg) scale(1);}
}

@keyframes row{
  from{ transform:scaleX(0);}
  to{ transform:scaleX(1);}
}

@keyframes col{
  from{ transform:scaleY(0);}
  to{ transform:scaleY(1);}
}

@keyframes pop{
  0%{transform:scale(0.6);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

@media(max-width:480px){

.container{
    width:92vmin;
    height:92vmin;
}

.btn{
    border-radius:8px;
}

}
@media screen and (min-width: 786px) {
    .btn:hover:not(:disabled){
  background:linear-gradient(145deg,#00ced1,#00a0a0);
}

}
  
</style>

<body>
   
    <h1>Tic Tac Toe</h1>
    <p></p>
    <p class="guide"></p>
    <div class="container">
        <div class="line"></div>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
        <button class="btn"></button>
    </div>
    <audio src="mixkit-unlock-game-notification-253.wav" id="win"></audio>
    <audio src="mixkit-fast-double-click-on-mouse-275.wav" id="click"></audio>
    <audio src="mixkit-short-transition-sweep-175.wav" id="reset"></audio>
    <audio src="mixkit-short-buzzer-sound-2963.wav" id="draw"></audio>
    <button class="reset">Reset Game</button>
    <script src="script.js"></script>
</body>

</html>
